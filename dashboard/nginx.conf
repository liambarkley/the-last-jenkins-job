server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the dashboard
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Proxy Jenkins API for live status (while Jenkins is alive)
    location /api/jenkins/ {
        proxy_pass http://jenkins:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host jenkins:8080;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        proxy_intercept_errors on;
        error_page 502 503 504 = @jenkins_gone;
    }

    # When Jenkins is dead, return the tombstone
    location @jenkins_gone {
        return 200 '{"status":"terminated","message":"Jenkins has left the building"}';
        add_header Content-Type application/json;
    }

    # Serve Jenkins state files (written to shared volume)
    location /state/ {
        alias /var/jenkins_home_ro/;
        add_header Cache-Control "no-store";
        add_header Access-Control-Allow-Origin "*";
    }
}
