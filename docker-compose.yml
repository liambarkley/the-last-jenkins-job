# ╔══════════════════════════════════════════════════════════════════╗
# ║               THE LAST JENKINS JOB                              ║
# ║        Local infrastructure: Gitea + Jenkins + Dashboard        ║
# ║                                                                  ║
# ║  docker compose up -d   (ready in ~20 seconds)                  ║
# ║                                                                  ║
# ║  Then: open http://localhost:8080 → click Build Now             ║
# ║  Watch: http://localhost:8888                                    ║
# ╚══════════════════════════════════════════════════════════════════╝

services:

  # ── Gitea ──────────────────────────────────────────────────────────
  # Self-hosted Git. Lightweight, native ARM64, boots in seconds.
  # After Jenkins is gone, ArgoCD will watch this forever.
  gitea:
    image: gitea/gitea:1.21-rootless
    container_name: gitea
    hostname: gitea
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__server__ROOT_URL=http://localhost:3001
      - GITEA__server__HTTP_PORT=3001
      - GITEA__server__DOMAIN=localhost
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__security__SECRET_KEY=last-jenkins-job-secret
      - GITEA__security__INTERNAL_TOKEN=last-jenkins-job-internal-token
      - GITEA__service__DISABLE_REGISTRATION=true
      - GITEA__log__LEVEL=Warn
      - GITEA__actions__ENABLED=false
      # (Admin user is created by gitea-init via docker exec on first boot)
    ports:
      - "3001:3001"
      - "2222:2222"
    volumes:
      - gitea_data:/var/lib/gitea
      - gitea_config:/etc/gitea
    networks:
      - last-jenkins-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/version"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  # ── Gitea init ─────────────────────────────────────────────────────
  # Runs once after Gitea is healthy.
  # Creates the repo and pushes the project code — no manual git steps needed.
  gitea-init:
    image: alpine:3.19
    container_name: gitea-init
    restart: "no"
    networks:
      - last-jenkins-net
    depends_on:
      gitea:
        condition: service_healthy
    volumes:
      - ./:/workspace:ro                           # Mount the project files read-only
      - /var/run/docker.sock:/var/run/docker.sock  # To create admin via docker exec
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        apk add --no-cache git curl docker-cli > /dev/null 2>&1

        echo "👤 Creating Gitea admin user..."
        docker exec gitea gitea admin user create \
          --username gitea \
          --password gitops-forever \
          --email admin@last-jenkins-job.local \
          --admin \
          --must-change-password=false 2>/dev/null \
          && echo "   Created admin user." \
          || echo "   Admin user already exists."

        echo "📁 Creating repo in Gitea..."
        curl -sf -X POST "http://gitea:3001/api/v1/user/repos" \
          -H "Content-Type: application/json" \
          -u "gitea:gitops-forever" \
          -d '{"name":"the-last-jenkins-job","private":false,"auto_init":false,"default_branch":"main"}' \
          > /dev/null && echo "   Created." || echo "   Already exists."

        echo "📦 Pushing project code to Gitea..."
        git config --global user.email "init@last-jenkins-job.local"
        git config --global user.name "The Last Jenkins Job"
        git config --global init.defaultBranch main

        mkdir -p /tmp/repo && cd /tmp/repo
        git init
        # Copy workspace files (excluding any existing .git)
        cp -r /workspace/. .
        rm -rf .git
        git init
        git add -A
        git commit -m "feat: The Last Jenkins Job — initial commit"
        git remote add origin "http://gitea:gitops-forever@gitea:3001/gitea/the-last-jenkins-job.git"
        git push -u origin main --force

        echo "✅ Code is in Gitea. Jenkins will pick it up automatically."

  # ── Jenkins ────────────────────────────────────────────────────────
  # The protagonist. Soon to be the martyr.
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: jenkins-controller
    hostname: jenkins-controller
    restart: unless-stopped
    user: root   # Required so the farewell script can reach the Docker socket.
                 # On Docker Desktop, the mounted socket file may not be world-accessible
                 # (srw-rw---- rather than srw-rw-rw-), so non-root users can't connect
                 # even via curl --unix-socket. Root bypasses this entirely.
                 # For a demo pipeline whose whole point is to delete itself: acceptable.
    entrypoint:
      - /bin/sh
      - -c
      - |
        # Git 2.35+ refuses to operate in directories owned by a different uid.
        # Running as root but workspace dirs are owned by uid 1000 (jenkins) triggers
        # the "dubious ownership" / "not in a git directory" error. Tell git to
        # trust everything — this is a single-purpose demo container, not production.
        git config --global --add safe.directory '*'
        # Make the Docker socket world-accessible so curl --unix-socket works
        # regardless of the socket's group GID on this host.
        chmod 666 /var/run/docker.sock 2>/dev/null || true
        # Hand off to the normal Jenkins entrypoint
        exec /usr/bin/tini -- /usr/local/bin/jenkins.sh
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - GITEA_URL=http://gitea:3001
      - GITEA_EXT_URL=http://localhost:3001
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false -Dhudson.model.DirectoryBrowserSupport.CSP=
      - JENKINS_OPTS=--httpPort=8080
      - TF_VERSION=1.8.0
      - HELM_VERSION=3.14.0
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc.yaml
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock         # 🗡️  Self-destruct
      - ~/.kube:/var/jenkins_home/.kube:ro                 # Docker Desktop K8s
      - ./scripts:/var/jenkins_home/scripts:ro
      - ./terraform:/var/jenkins_home/terraform:ro
      - ./platform-config:/var/jenkins_home/platform-config:ro
      - ./jenkins/casc.yaml:/var/jenkins_home/casc.yaml:ro  # Auto-configure Jenkins
    networks:
      - last-jenkins-net
    depends_on:
      gitea:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ── Dashboard ──────────────────────────────────────────────────────
  # The viewing gallery. Outlives Jenkins, naturally.
  dashboard:
    image: nginx:1.25-alpine
    container_name: last-jenkins-dashboard
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - jenkins_home:/var/jenkins_home_ro:ro
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - last-jenkins-net
    depends_on:
      - jenkins

volumes:
  gitea_data:
  gitea_config:
  jenkins_home:

networks:
  last-jenkins-net:
    driver: bridge
